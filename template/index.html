<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Highrise Bot Panel</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; margin-top: 5px; background: #6200ee; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Bot Controller</h2>
    <div class="card">
        <input type="text" id="cmdInput" placeholder="Enter command..." style="width:100%; padding:10px;">
        <button onclick="sendCommand()">EXECUTE</button>
    </div>
    <div id="locs" class="card"><h3>Saved Locations</h3></div>
    
    <script>
        async function sendCommand() {
            let cmd = document.getElementById('cmdInput').value;
            await fetch('/api/bot/command', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({command: cmd})
            });
            alert('Command sent!');
        }
    </script>
</body>
</html>
